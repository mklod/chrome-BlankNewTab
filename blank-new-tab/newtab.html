<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>New Tab</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
  </style>
  <script>
    var s = localStorage.getItem("bgColor");
    if (s) document.documentElement.style.backgroundColor = s;
  </script>
</head>
<body>
  <script src="newtab.js"></script>
</body>
</html>
