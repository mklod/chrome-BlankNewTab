<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Blank New Tab — Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #111113;
      --surface: #1c1c20;
      --surface-hover: #242429;
      --border: #2e2e35;
      --text: #e4e4e8;
      --text-dim: #8a8a96;
      --accent: #6e6eff;
      --accent-glow: rgba(110, 110, 255, 0.15);
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 340px;
      padding: 24px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-glow);
      border: 1px solid rgba(110,110,255,0.25);
      display: grid;
      place-items: center;
    }
    .header-icon svg { width: 16px; height: 16px; }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* ── Sections ── */
    .section {
      margin-bottom: 20px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    /* ── Color picker row ── */
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .color-row:hover {
      border-color: rgba(110,110,255,0.35);
    }
    .color-swatch-wrap {
      position: relative;
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }
    .color-swatch-wrap input[type="color"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      padding: 0;
      cursor: pointer;
      border-radius: 8px;
      background: none;
      -webkit-appearance: none;
    }
    .color-swatch-wrap input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    .color-swatch-wrap input[type="color"]::-webkit-color-swatch {
      border: 2px solid var(--border);
      border-radius: 8px;
    }
    .color-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .color-info .label { font-size: 13px; font-weight: 500; }
    .color-hex {
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'DM Sans', monospace;
    }

    /* ── Presets ── */
    .presets {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .preset {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    }
    .preset:hover {
      transform: scale(1.15);
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .preset.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    /* ── Toggle switch ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      transition: border-color 0.2s;
    }
    .toggle-row:hover { border-color: rgba(110,110,255,0.35); }
    .toggle-text .label { font-size: 13px; font-weight: 500; }
    .toggle-text .hint  { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    .switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: var(--text);
      border-radius: 50%;
      transition: transform 0.25s;
    }
    .switch input:checked + .slider {
      background: var(--accent);
    }
    .switch input:checked + .slider::before {
      transform: translateX(18px);
    }

    /* ── Saved toast ── */
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: transform 0.3s cubic-bezier(.4,.0,.2,1), opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Shortcut hint ── */
    .shortcut-hint {
      margin-top: 8px;
      padding: 10px 12px;
      background: rgba(110,110,255,0.06);
      border: 1px dashed rgba(110,110,255,0.2);
      border-radius: 8px;
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.5;
    }
    .shortcut-hint kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: inherit;
      color: var(--text);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" color="#6e6eff">
        <rect x="2" y="2" width="12" height="12" rx="2"/>
      </svg>
    </div>
    <h1>Blank New Tab</h1>
  </div>

  <!-- Background color -->
  <div class="section">
    <div class="section-label">Background Color</div>
    <div class="color-row">
      <div class="color-swatch-wrap">
        <input type="color" id="bgColor" value="#1a1a1a">
      </div>
      <div class="color-info">
        <span class="label">Page fill</span>
        <span class="color-hex" id="hexLabel">#1a1a1a</span>
      </div>
    </div>
    <div class="presets" id="presets"></div>
  </div>

  <!-- Bookmarks bar -->
  <div class="section">
    <div class="section-label">Bookmarks Bar</div>
    <div class="toggle-row">
      <div class="toggle-text">
        <div class="label">Show bookmarks bar</div>
        <div class="hint">On new tab pages only</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="showBookmarks">
        <span class="slider"></span>
      </label>
    </div>
    <div class="shortcut-hint">
      Chrome controls the bookmarks bar natively.<br>
      Toggle it with <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>B</kbd>
      (or <kbd>⌘</kbd>+<kbd>Shift</kbd>+<kbd>B</kbd> on Mac).
      <br>This setting saves your preference so you can
      remember which state you chose.
    </div>
  </div>

  <div class="toast" id="toast">Saved</div>

  <script src="options.js"></script>
</body>
</html>
