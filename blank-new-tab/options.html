<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Blank New Tab — Settings</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #111113;
      --surface: #1c1c20;
      --surface-hover: #242429;
      --border: #2e2e35;
      --text: #e4e4e8;
      --text-dim: #8a8a96;
      --accent: #6e6eff;
      --accent-glow: rgba(110, 110, 255, 0.15);
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 340px;
      padding: 24px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-glow);
      border: 1px solid rgba(110,110,255,0.25);
      display: grid;
      place-items: center;
    }
    .header-icon svg { width: 16px; height: 16px; }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* ── Sections ── */
    .section {
      margin-bottom: 20px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    /* ── Color picker row ── */
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .color-row:hover {
      border-color: rgba(110,110,255,0.35);
    }
    .color-swatch-wrap {
      position: relative;
      width: 34px;
      height: 34px;
      flex-shrink: 0;
    }
    .color-swatch-wrap input[type="color"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      padding: 0;
      cursor: pointer;
      border-radius: 8px;
      background: none;
      -webkit-appearance: none;
    }
    .color-swatch-wrap input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    .color-swatch-wrap input[type="color"]::-webkit-color-swatch {
      border: 2px solid var(--border);
      border-radius: 8px;
    }
    .color-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .color-info .label { font-size: 13px; font-weight: 500; }
    .color-hex {
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'DM Sans', monospace;
    }

    /* ── RGB inputs ── */
    .rgb-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .rgb-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .rgb-field label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-align: center;
    }
    .rgb-field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', monospace;
      font-size: 13px;
      padding: 6px 8px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    .rgb-field input:focus {
      border-color: var(--accent);
    }

    /* ── Hex input ── */
    .hex-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hex-row label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
    }
    .hex-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', monospace;
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    .hex-row input:focus {
      border-color: var(--accent);
    }

    /* ── Presets ── */
    .presets {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .preset {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    }
    .preset:hover {
      transform: scale(1.15);
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .preset.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    /* ── Saved toast ── */
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: transform 0.3s cubic-bezier(.4,.0,.2,1), opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" color="#6e6eff">
        <rect x="2" y="2" width="12" height="12" rx="2"/>
      </svg>
    </div>
    <h1>Blank New Tab</h1>
  </div>

  <!-- Background color -->
  <div class="section">
    <div class="section-label">Background Color</div>
    <div class="color-row">
      <div class="color-swatch-wrap">
        <input type="color" id="bgColor" value="#1a1a1a">
      </div>
      <div class="color-info">
        <span class="label">Page fill</span>
        <span class="color-hex" id="hexLabel">#1a1a1a</span>
      </div>
    </div>

    <div class="rgb-row">
      <div class="rgb-field">
        <label>R</label>
        <input type="number" id="rgbR" min="0" max="255" value="26">
      </div>
      <div class="rgb-field">
        <label>G</label>
        <input type="number" id="rgbG" min="0" max="255" value="26">
      </div>
      <div class="rgb-field">
        <label>B</label>
        <input type="number" id="rgbB" min="0" max="255" value="26">
      </div>
    </div>

    <div class="hex-row">
      <label>HEX</label>
      <input type="text" id="hexInput" value="#1a1a1a" maxlength="7" spellcheck="false">
    </div>

    <div class="presets" id="presets"></div>
  </div>

  <div class="toast" id="toast">Saved</div>

  <script src="options.js"></script>
</body>
</html>
